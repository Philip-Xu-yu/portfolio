services:
  - type: web
    name: deep-case-1-ecommerce-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_BASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    autoDeploy: true
